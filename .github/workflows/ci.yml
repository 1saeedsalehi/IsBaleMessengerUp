name: Is Bale Up?

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/cache/restore@v4
        with:
          path: .cache/uptime-last-state.json
          key: uptime-state-${{ github.repository }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            uptime-state-${{ github.repository }}-

      - name: Check URL; Telegram only on transition (silent down, sound on recovery)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHECK_URL: ${{ secrets.CHECK_URL }}
          TIMEOUT_MS: ${{ secrets.TIMEOUT_MS }}
        run: npm run check

      - uses: actions/cache/save@v4
        if: always()
        with:
          path: .cache/uptime-last-state.json
          key: uptime-state-${{ github.repository }}-${{ github.run_id }}-${{ github.run_attempt }}

# Schedules only run from the DEFAULT branch (Settings → General → Default branch).
# Fork: enable Actions on the fork (Actions tab). Public repo inactive 60d: re-enable the workflow.
# Cron is UTC. Minute 7 past each hour avoids the worst top-of-hour queue congestion on GitHub.
name: Bale uptime check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Persists last up/down between runs so we only Telegram on state change (less noise).
      - uses: actions/cache@v4
        with:
          path: .cache/uptime-last-state.json
          key: uptime-state-${{ github.repository }}-v1

      - name: Check URL; Telegram only on transition (silent down, sound on recovery)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHECK_URL: ${{ secrets.CHECK_URL }}
          TIMEOUT_MS: ${{ secrets.TIMEOUT_MS }}
        run: npm run check
